name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    name: Worker デプロイ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: pnpm インストール
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 依存関係インストール
        run: pnpm install --frozen-lockfile
        working-directory: apps/worker

      - name: Worker デプロイ
        run: pnpm exec wrangler deploy
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-admin:
    name: 管理画面 デプロイ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: pnpm インストール
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 依存関係インストール
        run: pnpm install --frozen-lockfile

      - name: Next.js ビルド
        run: pnpm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://my-x-bot.thinkbal-line-crm.workers.dev

      - name: Cloudflare Pages デプロイ
        run: pnpm exec wrangler pages deploy out --project-name my-x-bot-admin-fb2b6651 --commit-dirty=true
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
